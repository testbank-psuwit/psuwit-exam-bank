  <script>
    // 🔥 ใส่ URL ที่ก๊อปปี้มาจาก Google Apps Script ตรงนี้! 🔥
    const API_URL = "https://script.google.com/macros/s/AKfycbxT1PvF_sO3tifbAPT3UJ0aZkKr1JV_zLlCn7YcFRr1ZWVBQFFQkPeY4YFeaWsifOZClw/exec";

    // --- ฟังก์ชันเข้าสู่ระบบ (ส่งผ่าน fetch) ---
    function verifyLogin() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if (!user || !pass) {
        Swal.fire({icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกข้อมูลให้ครบถ้วนครับ'});
        return;
      }

      const btn = document.getElementById('btnLogin');
      btn.innerHTML = 'กำลังตรวจสอบ...';
      btn.disabled = true;

      // ส่งข้อมูลไปหา Google API
      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "login", username: user, password: pass })
      })
      .then(res => res.json())
      .then(response => {
        btn.innerHTML = 'เข้าสู่ระบบ';
        btn.disabled = false;
        
        if (response.success) {
          Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'ยินดีต้อนรับ ' + response.name, timer: 1500, showConfirmButton: false }).then(() => {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'block';
            document.getElementById('display-name').innerText = "คุณ " + response.name;
            document.getElementById('uploaderName').value = response.name;
	        refreshExamCounts();
          setTimeout(() => {
              document.getElementById('dashboard-page').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 200);
          });
        } else {
          Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: response.message });
        }
      }).catch(err => {
        btn.innerHTML = 'เข้าสู่ระบบ';
        btn.disabled = false;
        Swal.fire({ icon: 'error', title: 'เชื่อมต่อล้มเหลว', text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้' });
      });
    }

   // --- ฟังก์ชันส่งข้อสอบ (ส่งผ่าน fetch) ---
function uploadData() {
  const uploaderName = document.getElementById("uploaderName") ? document.getElementById("uploaderName").value : document.getElementById("display-name").innerText;
  const year = document.getElementById("year").value;
  const term = document.getElementById("term").value;
  const subject = document.getElementById("subject").value;
  const learningArea = document.getElementById("learningArea").value;
  const standard = document.getElementById("standard").value;
  const indicator = document.getElementById("indicator").value;
  const questionNo = document.getElementById("questionNo").value;
  const fileInput = document.getElementById("file");

  if (!year || !term || !subject || !learningArea || !standard || !indicator || !questionNo || fileInput.files.length === 0) {
    Swal.fire({icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกข้อมูลและแนบไฟล์ให้ครบถ้วนครับ'});
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  const btnUpload = document.getElementById("btnUpload");
  btnUpload.innerHTML = 'กำลังบันทึกข้อมูล...';
  btnUpload.disabled = true;

  reader.onload = function(e) {
    const base64Data = e.target.result.split(',')[1];

    // แพ็คข้อมูลส่งไปให้ Apps Script (เพิ่มระดับชั้นเข้ามาแล้ว!)
const payload = {
  action: "upload",
  uploaderName: uploaderName,
  year: year,
  term: term,
  subject: subject,
  courseType: document.getElementById("courseType") ? document.getElementById("courseType").value : "", // 🟢 แทรกบรรทัดนี้เข้าไปแล้วครับ!
  educationLevel: document.getElementById("educationLevel").value, 
  learningArea: learningArea,
  standard: standard,
  indicator: indicator,
  questionNo: questionNo,
  fileName: file.name,
  mimeType: file.type,
  fileBase64: base64Data
};

    fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(result => {
      btnUpload.innerHTML = 'บันทึกข้อสอบ';
      btnUpload.disabled = false;
      
      if(result.success) {
        Swal.fire({icon: 'success', title: 'สำเร็จ!', text: result.message}).then(() => {
          document.getElementById("uploadForm").reset();
          if(typeof updateAreas === 'function') updateAreas(); 
          bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
        });
      } else {
        Swal.fire({icon: 'error', title: 'ข้อผิดพลาด', text: result.message});
      }
    })
    .catch(error => {
      console.error("Error:", error);
      btnUpload.innerHTML = 'บันทึกข้อสอบ';
      btnUpload.disabled = false;
      Swal.fire({icon: 'error', title: 'เชื่อมต่อล้มเหลว', text: 'เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่'});
    });
  };

  reader.readAsDataURL(file);
}

          "1.เข้าใจความหลากหลายของการแสดงจำนวน ระบบจำนวน การดำเนินการของจำนวนผลที่เกิดขึ้นจากการดำเนินการ สมบัติของการดำเนินการ และนำไปใช้": ["เข้าใจและใช้ความรู้เกี่ยวกับเซตในการสื่อสารและสื่อความหมายทางคณิตศาสตร์", "เข้าใจและใช้ความรู้เกี่ยวกับตรรกศาสตร์เบื้องต้น ในการสื่อสาร สื่อความหมาย และอ้างเหตุผล", "เข้าใจจำนวนจริงและใช้สมบัติของจำนวนจริงในการแก้ปัญหา", "เข้าใจและใช้สมบัติของจำนวนเชิงซ้อนในการแก้ปัญหา", "หารากที่ n ของจำนวนเชิงซ้อน เมื่อ n เป็นจำนวนนับที่มากกว่า ๑"],
          "2.เข้าใจและวิเคราะห์แบบรูป ความสัมพันธ์ ฟังก์ชัน ลำดับและอนุกรม และนำไปใช้": ["หาผลลัพธ์ของการบวก การลบ การคูณ การหารฟังก์ชัน หาฟังก์ชันประกอบและฟังก์ชันผกผัน", "ใช้สมบัติของฟังก์ชันในการแก้ปัญหา", "เข้าใจลักษณะกราฟของฟังก์ชันเอกซ์โพเนนเชียลและฟังก์ชันลอการิทึมและนำไปใช้ในการแก้ปัญหา", "เข้าใจฟังก์ชันตรีโกณมิติและลักษณะกราฟของฟังก์ชันตรีโกณมิติและนำไปใช้ในการแก้ปัญหา", "ระบุได้ว่าลำดับที่กำหนดให้เป็นลำดับลู่เข้าหรือลู่ออก", "หาผลบวก n พจน์แรกของอนุกรมเลขคณิตและอนุกรมเรขาคณิต", "เข้าใจและนำความรู้เกี่ยวกับลำดับและอนุกรมไปใช้"],
	    "3.ใช้นิพจน์ สมการ อสมการ และเมทริกซ์ อธิบายความสัมพันธ์ หรือช่วยแก้ปัญหาที่กำหนดให้": ["แก้สมการและอสมการพหุนามตัวแปรเดียวดีกรีไม่เกินสี่และนำไปใช้ในการแก้ปัญหา", "แก้สมการและอสมการเศษส่วนพหุนามตัวแปรเดียวและนำไปใช้ในการแก้ปัญหา", "แก้สมการและอสมการค่าสัมบูรณ์ของพหุนามตัวแปรเดียว และนำไปใช้ในการแก้ปัญหา", "แก้สมการเอกซ์โพเนนเชียลและสมการลอการิทึมและนำไปใช้ในการแก้ปัญหา", "แก้สมการตรีโกณมิติและนำไปใช้ในการแก้ปัญหา", "ใช้กฎของโคไซน์และกฎของไซน์ในการแก้ปัญหา", "เข้าใจความหมาย หาผลลัพธ์ของการบวกเมทริกซ์ การคูณเมทริกซ์กับจำนวนจริง", "หาเมทริกซ์ผกผันของเมทริกซ์ ๒ x ๒", "แก้ระบบสมการเชิงเส้นโโยใช้เมทริกซ์ผกผันและการดำเนินการตามแถว", "แก้สมการพหุนามตัวแปรเดียว ดีกรีไม่เกินสี่ ที่มีสัมประสิทธิ์เป็นจำนวนเต็มและนำไปใช้ในการแก้ปัญหา"]

    // 0. ฟังก์ชันตัวช่วยดึงฐานข้อมูล (สมองกลดำน้ำตามเงื่อนไขวิชา)
    function getTargetData() {
        const subject = document.getElementById("subject").value;
        if (!subject || !curriculumData[subject]) return null;

        let data = curriculumData[subject];

        if (subject === "คณิตศาสตร์") {
            const eduLevel = document.getElementById("educationLevel").value;
            if (!eduLevel || !data[eduLevel]) return null;
            data = data[eduLevel];
            
            const courseType = document.getElementById("courseType").value;
            if (!courseType || !data[courseType]) return null;
            data = data[courseType];
        } 
        else if (subject === "วิทยาศาสตร์และเทคโนโลยี") {
            const courseType = document.getElementById("courseType").value;
            if (!courseType || !data[courseType]) return null;
            data = data[courseType];
        }
        
        // ถ้าเป็นวิชาอื่นๆ จะหลุดรอดเงื่อนไขด้านบน แล้วส่งคืน data ไปเลย
        return data;
    }

    // 1. เมื่อเลือก "วิชา"
    function updateEduLevels() {
        const subject = document.getElementById("subject").value;
        const eduLevelBox = document.getElementById("eduLevelBox");
        const eduLevelSelect = document.getElementById("educationLevel");
        const courseTypeBox = document.getElementById("courseTypeBox");
        const courseTypeSelect = document.getElementById("courseType");
        
        const areaSelect = document.getElementById("learningArea");
        const standardSelect = document.getElementById("standard");
        const indicatorSelect = document.getElementById("indicator");

        // จัดการซ่อน/โชว์ กล่องตามวิชาที่เลือก
        if (subject === "คณิตศาสตร์") {
            if (eduLevelBox) eduLevelBox.style.display = "block";
            if (courseTypeBox) courseTypeBox.style.display = "block";
        } else if (subject === "วิทยาศาสตร์และเทคโนโลยี") {
            if (eduLevelBox) eduLevelBox.style.display = "none";
            if (courseTypeBox) courseTypeBox.style.display = "block";
        } else {
            if (eduLevelBox) eduLevelBox.style.display = "none";
            if (courseTypeBox) courseTypeBox.style.display = "none";
        }

        // ล้างค่าและตั้งต้นใหม่ป้องกันการค้าง
        eduLevelSelect.innerHTML = '<option value="">-- เลือกระดับชั้น --</option>';
        courseTypeSelect.value = "";
        areaSelect.innerHTML = '<option value="">-- เลือกสาระการเรียนรู้ --</option>';
        standardSelect.innerHTML = '<option value="">-- เลือกมาตรฐาน --</option>';
        indicatorSelect.innerHTML = '<option value="">-- เลือกตัวชี้วัด --</option>';
        
        eduLevelSelect.disabled = true;
        areaSelect.disabled = true;
        standardSelect.disabled = true;
        indicatorSelect.disabled = true;

        if (!subject || !curriculumData[subject]) return;

        // แยกเส้นทางการดึงข้อมูล
        if (subject === "คณิตศาสตร์") {
            eduLevelSelect.disabled = false;
            for (let level in curriculumData[subject]) {
                eduLevelSelect.innerHTML += `<option value="${level}">${level}</option>`;
            }
        } 
        // ถ้าเป็นวิชาอื่นๆ ที่ไม่ใช่วิทยาศาสตร์ (เช่น สังคม, ไทย) ดึงสาระมาแสดงทันที
        else if (subject !== "วิทยาศาสตร์") {
            updateAreas(); 
        }
    }

    // 2. เมื่อเลือก ระดับชั้น หรือ ประเภทรายวิชา (ใช้ร่วมกันเพื่อดึง "สาระฯ")
    function updateAreas() {
        const areaSelect = document.getElementById("learningArea");
        const standardSelect = document.getElementById("standard");
        const indicatorSelect = document.getElementById("indicator");

        areaSelect.innerHTML = '<option value="">-- เลือกสาระการเรียนรู้ --</option>';
        standardSelect.innerHTML = '<option value="">-- เลือกมาตรฐาน --</option>';
        indicatorSelect.innerHTML = '<option value="">-- เลือกตัวชี้วัด --</option>';
        
        areaSelect.disabled = true;
        standardSelect.disabled = true;
        indicatorSelect.disabled = true;

        const targetData = getTargetData();
        if (!targetData) return;

        areaSelect.disabled = false;
        for (let area in targetData) {
            areaSelect.innerHTML += `<option value="${area}">${area}</option>`;
        }
    }

    // 3. เมื่อเลือก สาระการเรียนรู้ (ดึง "มาตรฐาน")
    function updateStandards() {
        const area = document.getElementById("learningArea").value;
        const standardSelect = document.getElementById("standard");
        const indicatorSelect = document.getElementById("indicator");

        standardSelect.innerHTML = '<option value="">-- เลือกมาตรฐาน --</option>';
        indicatorSelect.innerHTML = '<option value="">-- เลือกตัวชี้วัด --</option>';
        
        standardSelect.disabled = true;
        indicatorSelect.disabled = true;

        const targetData = getTargetData();
        if (!targetData || !area || !targetData[area]) return;

        standardSelect.disabled = false;
        for (let std in targetData[area]) {
            standardSelect.innerHTML += `<option value="${std}">${std}</option>`;
        }
    }

    // 4. เมื่อเลือก มาตรฐาน (ดึง "ตัวชี้วัด")
    function updateIndicators() {
        const area = document.getElementById("learningArea").value;
        const standard = document.getElementById("standard").value;
        const indicatorSelect = document.getElementById("indicator");

        indicatorSelect.innerHTML = '<option value="">-- เลือกตัวชี้วัด --</option>';
        indicatorSelect.disabled = true;

        const targetData = getTargetData();
        if (!targetData || !area || !standard || !targetData[area][standard]) return;

        indicatorSelect.disabled = false;
        targetData[area][standard].forEach(ind => {
            indicatorSelect.innerHTML += `<option value="${ind}">${ind}</option>`;
        });
    }
// ==========================================
    // 📊 ระบบอัปเดตยอดจำนวนข้อสอบ
    // ==========================================
    function refreshExamCounts() {
      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "getCounts" })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success && data.counts) {
          let totalExams = 0;
          
          for (let subject in data.counts) {
            let countElement = document.getElementById("count-" + subject);
            if (countElement) {
              countElement.innerText = data.counts[subject];
            }
            totalExams += data.counts[subject];
          }
          
          let totalElement = document.getElementById("count-total");
          if (totalElement) {
            totalElement.innerText = totalExams;
          }
        }
      })
      .catch(err => console.error("โหลดข้อมูลสถิติไม่สำเร็จ:", err));
    }
  </script>
